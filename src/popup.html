<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prixe</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body class="popup-mode">
  <div class="container">
    <header class="header">
      <div class="brand-wrap">
        <div class="logo"><span class="logo-x">P</span><span class="logo-text">rixe</span></div>
        <p id="labelAppSubtitle" class="app-subtitle">Steam Arama filtrelerini tek noktadan yönet</p>
      </div>
            <div class="header-right header-actions">
        <label class="steam-switch" title="Prixe aktif/pasif">
          <input id="masterEnabled" type="checkbox" aria-label="Prixe aktif pasif">
          <span class="steam-slider"></span>
        </label>
        <span class="header-divider"></span>
        <button id="homeBtn" class="icon-btn tab-btn active" title="Ana Sayfa">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>
          </svg>
        </button>
        <button id="profilesBtn" class="icon-btn tab-btn" title="Profiller">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
          </svg>
        </button>
        <button id="settingsBtn" class="icon-btn tab-btn" title="Ayarlar">     
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
          </svg>
        </button>
      </div>
    </header>

    <main id="homePanel" class="main-area">
      <section class="panel-card">
        <h2 id="labelHomeFiltersSection" class="section-title">Arama filtreleri</h2>
        <div class="two-col-grid">
          <div class="field">
            <label id="labelMaxPrice" for="maxPrice">Max fiyat (USD)</label>
            <input id="maxPrice" type="number" min="0" step="1">
          </div>
          <div class="field">
            <label id="labelMinDiscount" for="minDiscount">Min indirim (%)</label>
            <input id="minDiscount" type="number" min="0" step="1">
          </div>
        </div>
        <div class="field">
          <label id="labelCategory1" for="category1">Kategori</label>
          <select id="category1">
            <option id="categoryGames" value="998">Oyunlar</option>
            <option id="categorySoftware" value="994">Yazılım</option>
            <option id="categoryDlc" value="21">İndirilebilir İçerik</option>
            <option id="categoryDemos" value="10">Demolar</option>
            <option id="categorySoundtracks" value="990">Oyun Müzikleri</option>
            <option id="categoryPlaytest" value="989">Playtest</option>
            <option id="categoryVideos" value="992">Videolar</option>
            <option id="categoryMods" value="997">Modlar</option>
            <option id="categoryHardware" value="993">Donanım</option>
          </select>
        </div>
        <div class="preset-row">
          <button class="chip-btn preset" data-maxprice="5">$5</button>
          <button class="chip-btn preset" data-maxprice="10">$10</button>
          <button class="chip-btn preset" data-maxprice="20">$20</button>
          <button class="chip-btn preset" data-maxprice="40">$40</button>
        </div>
        <div class="field">
          <label id="labelReviewFilter" for="reviewFilter">İnceleme filtresi</label>
          <select id="reviewFilter">
            <option id="reviewAny" value="any">Tüm skorlar</option>
            <option id="reviewPositivePlus" value="positive_plus">Pozitif ve üzeri</option>
            <option id="reviewVeryPositivePlus" value="very_positive_plus">Çok pozitif ve üzeri</option>
          </select>
        </div>
        <div class="two-col-grid">
          <div class="field">
            <label id="labelMinReviews" for="minReviews">Min inceleme adedi</label>
            <select id="minReviews">
              <option value="0">0</option>
              <option value="50">50</option>
              <option value="100">100</option>
              <option value="500">500</option>
              <option value="1000">1000</option>
            </select>
          </div>
          <div class="field">
            <label id="labelSortBy" for="sortBy">Sıralama</label>
            <select id="sortBy">
              <option id="sortDefault" value="default">Steam varsayılan</option>
              <option id="sortPriceAsc" value="price_asc">Fiyat artan</option>
              <option id="sortPriceDesc" value="price_desc">Fiyat azalan</option>
              <option id="sortDiscountDesc" value="discount_desc">İndirim yüksekten</option>
            </select>
          </div>
        </div>
        <div class="two-col-grid">
          <div class="field">
            <label id="labelMinUserScore" for="minUserScore">Min olumlu oran (%)</label>
            <select id="minUserScore">
              <option value="0">0</option>
              <option value="70">70</option>
              <option value="80">80</option>
              <option value="90">90</option>
              <option value="95">95</option>
            </select>
          </div>
          <div class="field">
            <label id="labelMinReleaseYear" for="minReleaseYear">Min çıkış yılı</label>
            <select id="minReleaseYear">
              <option id="allYearsOption" value="0">Tüm yıllar</option>
              <option value="2026">2026+</option>
              <option value="2024">2024+</option>
              <option value="2020">2020+</option>
              <option value="2015">2015+</option>
            </select>
          </div>
        </div>
      </section>

      <section class="panel-card">
        <h2 id="labelCheckboxFiltersSection" class="section-title">Onay kutusu filtreleri</h2>
        <div class="check-grid">
          <label id="labelSpecials" class="check-item"><input id="specials" type="checkbox"> Sadece indirimde</label>
          <label id="labelHidef2p" class="check-item"><input id="hidef2p" type="checkbox"> Ücretsizleri gizle</label>
          <label id="labelHideEarlyAccess" class="check-item"><input id="hideEarlyAccess" type="checkbox"> Erken erişimi gizle</label>
          <label id="labelOnlyTradingCards" class="check-item"><input id="onlyTradingCards" type="checkbox"> Steam koleksiyon kartları</label>
          <label id="labelOnlyCloudSaves" class="check-item"><input id="onlyCloudSaves" type="checkbox"> Steam Cloud</label>
          <label id="labelHideComingSoon" class="check-item"><input id="hideComingSoon" type="checkbox"> Çok yakında etiketini gizle</label>
        </div>
      </section>

      <section class="panel-card">
        <h2 id="labelFilterSettings" class="section-title">Filtre ayarları</h2>
        <div class="two-col-grid">
          <div class="field">
            <label id="labelLowPrice" for="lowPrice">Düşük fiyat limiti ($)</label>
            <input id="lowPrice" type="number" min="0" step="1">
          </div>
          <div class="field">
            <label id="labelMidPrice" for="midPrice">Orta fiyat limiti ($)</label>
            <input id="midPrice" type="number" min="1" step="1">
          </div>
        </div>
        <div class="check-grid compact">
          <label id="labelEnablePriceHighlight" class="check-item"><input id="enablePriceHighlight" type="checkbox"> Fiyat işaretleme aktif</label>
          <label id="labelHideMixedOrWorse" class="check-item"><input id="hideMixedOrWorse" type="checkbox"> Mixed ve altı gizle</label>
        </div>
      </section>

      <div class="action-row">
        <button id="applyBtn" class="btn-primary">Uygula</button>
        <button id="openSearchBtn" class="btn-secondary">Steam Aramayı Aç</button>
        <button id="resetBtn" class="btn-ghost">Sıfırla</button>
      </div>
    </main>

    <div id="profilesPanel" class="main-area hidden">
      <section class="panel-card">
        <h2 id="labelProfilesSection" class="section-title">Favori profiller</h2>
        <div class="profile-list">
          <div class="profile-row">
            <span id="profileCasualName" class="profile-name">Casual</span>
            <div class="profile-actions">
              <button id="profileLoadCasual" class="chip-btn profile-load" data-profile="casual">Yükle</button>
              <button id="profileSaveCasual" class="chip-btn profile-save" data-profile="casual">Kaydet</button>
            </div>
          </div>
          <div class="profile-row">
            <span id="profileDiscountHunterName" class="profile-name">İndirim Avcısı</span>
            <div class="profile-actions">
              <button id="profileLoadDiscountHunter" class="chip-btn profile-load" data-profile="discountHunter">Yükle</button>
              <button id="profileSaveDiscountHunter" class="chip-btn profile-save" data-profile="discountHunter">Kaydet</button>
            </div>
          </div>
          <div class="profile-row">
            <span id="profileNewReleasesName" class="profile-name">Yeni Oyunlar</span>
            <div class="profile-actions">
              <button id="profileLoadNewReleases" class="chip-btn profile-load" data-profile="newReleases">Yükle</button>
              <button id="profileSaveNewReleases" class="chip-btn profile-save" data-profile="newReleases">Kaydet</button>
            </div>
          </div>
        </div>
      </section>
    </div>
    <div id="settingsPanel" class="main-area hidden">
      <section class="panel-card">
        <h2 id="labelSettingsSection" class="section-title">Genel Ayarlar</h2>
        <div class="field">
          <label id="labelLanguage" for="languageSelect">Dil / Language</label>
          <select id="languageSelect">
            <option value="tr">TR</option>
            <option value="en">EN</option>
          </select>
        </div>
      </section>
    </div>
    <div class="status-wrap"><p id="status" class="status-line"></p></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
