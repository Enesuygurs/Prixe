<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Steam Search Helper</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body class="popup-mode">
  <div class="container">
    <div class="header">
      <div class="logo">
        <span class="logo-x">P</span><span class="logo-text">rixe</span>
      </div>
      <div class="header-actions">
        <button id="homeBtn" class="icon-btn tab-btn active" title="Ana Sayfa">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline>
          </svg>
        </button>
        <button id="checkboxBtn" class="icon-btn tab-btn" title="Checkboxlar">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="4" width="18" height="16" rx="2"></rect>
            <path d="M7 9h4M7 15h4M13 9h4M13 15h4"></path>
          </svg>
        </button>
        <button id="settingsBtn" class="icon-btn tab-btn" title="Ayarlar">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="3"></circle><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"></path>
          </svg>
        </button>
      </div>
    </div>

    <section id="settingsPanel" class="settings-panel hidden">
      <div class="settings-content steam-layout">
        <label id="labelFilterSettings" class="steam-section-title">Filtre ayarlari</label>

        <div class="steam-grid">
          <div>
            <label id="labelLowPrice" for="lowPrice">Dusuk fiyat limiti ($)</label>
            <input id="lowPrice" type="number" min="0" step="1">
          </div>
          <div>
            <label id="labelMidPrice" for="midPrice">Orta fiyat limiti ($)</label>
            <input id="midPrice" type="number" min="1" step="1">
          </div>
        </div>

        <div class="steam-checkbox-row">
          <label id="labelEnablePriceHighlight"><input id="enablePriceHighlight" type="checkbox"> Fiyat isaretleme aktif</label>
          <label id="labelHideMixedOrWorse"><input id="hideMixedOrWorse" type="checkbox"> Mixed ve alti gizle</label>
        </div>

        <div class="steam-actions">
          <button id="saveSettingsBtn" class="btn-save">Ayar Kaydet</button>
          <button id="resetBtn" class="steam-pill">Sifirla</button>
        </div>

        <div class="steam-section-divider"></div>

        <label id="labelLanguageSection" class="steam-section-title">Language</label>

        <div>
          <select id="languageSelect">
            <option value="tr">Türkçe</option>
            <option value="en">English</option>
          </select>
        </div>
      </div>
    </section>

    <div id="homePanel" class="main-area">
      <div class="settings-content steam-layout">
        <label id="labelHomeFiltersSection" class="steam-section-title">Search filters</label>

        <div>
          <label id="labelMaxPrice" for="maxPrice">Max fiyat (USD)</label>
          <input id="maxPrice" type="number" min="0" step="1">
        </div>

        <div class="steam-preset-row">
          <button class="steam-pill preset" data-maxprice="5">$5</button>
          <button class="steam-pill preset" data-maxprice="10">$10</button>
          <button class="steam-pill preset" data-maxprice="20">$20</button>
          <button class="steam-pill preset" data-maxprice="40">$40</button>
        </div>

        <div class="steam-grid">
          <div>
            <label id="labelMinDiscount" for="minDiscount">Min indirim (%)</label>
            <select id="minDiscount">
              <option value="0">0</option>
              <option value="10">10</option>
              <option value="25">25</option>
              <option value="50">50</option>
              <option value="75">75</option>
            </select>
          </div>
          <div>
            <label id="labelReviewFilter" for="reviewFilter">Inceleme filtresi</label>
            <select id="reviewFilter">
              <option id="reviewAny" value="any">Tum skorlar</option>
              <option id="reviewPositivePlus" value="positive_plus">Pozitif ve uzeri</option>
              <option id="reviewVeryPositivePlus" value="very_positive_plus">Cok pozitif ve uzeri</option>
            </select>
          </div>
        </div>

        <div class="steam-grid">
          <div>
            <label id="labelMinReviews" for="minReviews">Min inceleme adedi</label>
            <select id="minReviews">
              <option value="0">0</option>
              <option value="50">50</option>
              <option value="100">100</option>
              <option value="500">500</option>
              <option value="1000">1000</option>
            </select>
          </div>
          <div>
            <label id="labelSortBy" for="sortBy">Siralama</label>
            <select id="sortBy">
              <option id="sortDefault" value="default">Steam varsayilan</option>
              <option id="sortPriceAsc" value="price_asc">Fiyat artan</option>
              <option id="sortPriceDesc" value="price_desc">Fiyat azalan</option>
              <option id="sortDiscountDesc" value="discount_desc">Indirim yuksekten</option>
            </select>
          </div>
        </div>

        <div class="steam-grid">
          <div>
            <label id="labelMinUserScore" for="minUserScore">Min olumlu oran (%)</label>
            <select id="minUserScore">
              <option value="0">0</option>
              <option value="70">70</option>
              <option value="80">80</option>
              <option value="90">90</option>
              <option value="95">95</option>
            </select>
          </div>
          <div>
            <label id="labelMinReleaseYear" for="minReleaseYear">Min cikis yili</label>
            <select id="minReleaseYear">
              <option id="allYearsOption" value="0">Tum yillar</option>
              <option value="2026">2026+</option>
              <option value="2024">2024+</option>
              <option value="2020">2020+</option>
              <option value="2015">2015+</option>
            </select>
          </div>
        </div>

        <div class="steam-actions">
          <button id="applyBtn" class="btn-save">Uygula</button>
          <button id="openSearchBtn" class="steam-pill">Steam Search Ac</button>
        </div>

        <p id="status" class="steam-status"></p>
      </div>
    </div>

   
  </div>

  <script src="popup.js"></script>
</body>
</html>
