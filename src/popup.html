<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prixe</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body class="popup-mode">
  <div class="container">
    <header class="header">
      <div class="brand-wrap">
        <div class="logo"><span class="logo-x">P</span><span class="logo-text">rixe</span></div>
        <p id="labelAppSubtitle" class="app-subtitle">Steam Search filtrelerini tek noktadan yonet</p>
      </div>
      <div class="header-right">
        <label class="steam-switch" title="Prixe aktif/pasif">
          <input id="masterEnabled" type="checkbox" aria-label="Prixe aktif pasif">
          <span class="steam-slider"></span>
        </label>
        <select id="languageSelect" class="lang-select" aria-label="Language">
          <option value="tr">TR</option>
          <option value="en">EN</option>
        </select>
      </div>
    </header>

    <main class="main-area">
      <section class="panel-card">
        <h2 id="labelHomeFiltersSection" class="section-title">Search filters</h2>
        <div class="field">
          <label id="labelMaxPrice" for="maxPrice">Max fiyat (USD)</label>
          <input id="maxPrice" type="number" min="0" step="1">
        </div>
        <div class="preset-row">
          <button class="chip-btn preset" data-maxprice="5">$5</button>
          <button class="chip-btn preset" data-maxprice="10">$10</button>
          <button class="chip-btn preset" data-maxprice="20">$20</button>
          <button class="chip-btn preset" data-maxprice="40">$40</button>
        </div>
        <div class="two-col-grid">
          <div class="field">
            <label id="labelMinDiscount" for="minDiscount">Min indirim (%)</label>
            <select id="minDiscount">
              <option value="0">0</option>
              <option value="10">10</option>
              <option value="25">25</option>
              <option value="50">50</option>
              <option value="75">75</option>
            </select>
          </div>
          <div class="field">
            <label id="labelReviewFilter" for="reviewFilter">Inceleme filtresi</label>
            <select id="reviewFilter">
              <option id="reviewAny" value="any">Tum skorlar</option>
              <option id="reviewPositivePlus" value="positive_plus">Pozitif ve uzeri</option>
              <option id="reviewVeryPositivePlus" value="very_positive_plus">Cok pozitif ve uzeri</option>
            </select>
          </div>
        </div>
        <div class="two-col-grid">
          <div class="field">
            <label id="labelMinReviews" for="minReviews">Min inceleme adedi</label>
            <select id="minReviews">
              <option value="0">0</option>
              <option value="50">50</option>
              <option value="100">100</option>
              <option value="500">500</option>
              <option value="1000">1000</option>
            </select>
          </div>
          <div class="field">
            <label id="labelSortBy" for="sortBy">Siralama</label>
            <select id="sortBy">
              <option id="sortDefault" value="default">Steam varsayilan</option>
              <option id="sortPriceAsc" value="price_asc">Fiyat artan</option>
              <option id="sortPriceDesc" value="price_desc">Fiyat azalan</option>
              <option id="sortDiscountDesc" value="discount_desc">Indirim yuksekten</option>
            </select>
          </div>
        </div>
        <div class="two-col-grid">
          <div class="field">
            <label id="labelMinUserScore" for="minUserScore">Min olumlu oran (%)</label>
            <select id="minUserScore">
              <option value="0">0</option>
              <option value="70">70</option>
              <option value="80">80</option>
              <option value="90">90</option>
              <option value="95">95</option>
            </select>
          </div>
          <div class="field">
            <label id="labelMinReleaseYear" for="minReleaseYear">Min cikis yili</label>
            <select id="minReleaseYear">
              <option id="allYearsOption" value="0">Tum yillar</option>
              <option value="2026">2026+</option>
              <option value="2024">2024+</option>
              <option value="2020">2020+</option>
              <option value="2015">2015+</option>
            </select>
          </div>
        </div>
      </section>

      <section class="panel-card">
        <h2 id="labelCheckboxFiltersSection" class="section-title">Checkbox filters</h2>
        <div class="check-grid">
          <label id="labelSpecials" class="check-item"><input id="specials" type="checkbox"> Sadece indirimde</label>
          <label id="labelHidef2p" class="check-item"><input id="hidef2p" type="checkbox"> Ucretsizleri gizle</label>
          <label id="labelNdl" class="check-item"><input id="ndl" type="checkbox"> DLC gizle</label>
          <label id="labelHideEarlyAccess" class="check-item"><input id="hideEarlyAccess" type="checkbox"> Early Access gizle</label>
          <label id="labelOnlyTradingCards" class="check-item"><input id="onlyTradingCards" type="checkbox"> Steam koleksiyon kartlari</label>
          <label id="labelOnlyAchievements" class="check-item"><input id="onlyAchievements" type="checkbox"> Steam basarimlari</label>
          <label id="labelOnlyCloudSaves" class="check-item"><input id="onlyCloudSaves" type="checkbox"> Steam Cloud</label>
          <label id="labelHideComingSoon" class="check-item"><input id="hideComingSoon" type="checkbox"> Coming Soon gizle</label>
        </div>
        <div class="platform-row">
          <label class="check-item" id="labelPlatformWin"><input id="platformWin" type="checkbox"> Win</label>
          <label class="check-item" id="labelPlatformMac"><input id="platformMac" type="checkbox"> Mac</label>
          <label class="check-item" id="labelPlatformLinux"><input id="platformLinux" type="checkbox"> Linux</label>
        </div>
      </section>

      <section class="panel-card">
        <h2 id="labelFilterSettings" class="section-title">Filtre ayarlari</h2>
        <div class="two-col-grid">
          <div class="field">
            <label id="labelLowPrice" for="lowPrice">Dusuk fiyat limiti ($)</label>
            <input id="lowPrice" type="number" min="0" step="1">
          </div>
          <div class="field">
            <label id="labelMidPrice" for="midPrice">Orta fiyat limiti ($)</label>
            <input id="midPrice" type="number" min="1" step="1">
          </div>
        </div>
        <div class="check-grid compact">
          <label id="labelEnablePriceHighlight" class="check-item"><input id="enablePriceHighlight" type="checkbox"> Fiyat isaretleme aktif</label>
          <label id="labelHideMixedOrWorse" class="check-item"><input id="hideMixedOrWorse" type="checkbox"> Mixed ve alti gizle</label>
        </div>
      </section>

      <div class="action-row">
        <button id="applyBtn" class="btn-primary">Uygula</button>
        <button id="openSearchBtn" class="btn-secondary">Steam Search Ac</button>
        <button id="resetBtn" class="btn-ghost">Sifirla</button>
      </div>

      <p id="status" class="status-line"></p>
    </main>
  </div>

  <script src="popup.js"></script>
</body>
</html>
